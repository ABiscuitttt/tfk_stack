####################################################################
# 新服务接入模板
#
# 使用方式:
#   1. 复制本文件到新目录，重命名为 docker-compose.yml
#   2. 将所有 "myapp" 替换为你的服务名
#   3. 修改 image 和 Host 规则
#   4. docker compose up -d
#
# 前置条件:
#   - Traefik 已启动（traefik/docker-compose.yml）
#   - traefik-net 网络已存在
####################################################################

services:
  myapp:
    image: myapp:latest
    restart: unless-stopped
    networks:
      - traefik-net
    labels:
      ## --- 必填项 ---

      # 启用 Traefik 自动发现（默认关闭，必须显式开启）
      - "traefik.enable=true"

      # 路由规则：通过什么域名访问此服务
      - "traefik.http.routers.myapp.rule=Host(`myapp.localhost`)"

      # 入口点：当前仅配置了 web (HTTP :80)
      - "traefik.http.routers.myapp.entrypoints=web"

      ## --- 可选项（按需取消注释）---

      # 指定容器端口（容器仅暴露一个端口时 Traefik 会自动检测，可省略）
      # - "traefik.http.services.myapp.loadbalancer.server.port=8080"

      # 后端使用 HTTPS 时设置（如 Portainer 等自带 TLS 的服务）
      # Traefik 已全局配置 insecureSkipVerify，无需额外处理证书验证
      # - "traefik.http.services.myapp.loadbalancer.server.scheme=https"

networks:
  traefik-net:
    external: true
    name: traefik-net